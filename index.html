<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Management System</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://unpkg.com/@supabase/supabase-js"></script>
    <style>
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .tab-button {
            padding: 10px 20px;
            background: #f8f9fa;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tab-button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .management-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        @media (max-width: 768px) {
            .management-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>College Management System</h1>
            <p>Complete management for students, faculty, courses, and departments</p>
        </header>

        <div class="tab-container">
            <button class="tab-button active" onclick="showTab('students')">Students</button>
            <button class="tab-button" onclick="showTab('faculty')">Faculty</button>
            <button class="tab-button" onclick="showTab('courses')">Courses</button>
            <button class="tab-button" onclick="showTab('departments')">Departments</button>
        </div>

        <main>
            <!-- Students Tab -->
            <div id="students-tab" class="tab-content active">
                <div class="management-grid">
                    <section class="form-section">
                        <h2>Student Registration</h2>
                        <form id="studentForm">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="firstName">First Name</label>
                                    <input type="text" id="firstName" name="firstName" required>
                                </div>
                                <div class="form-group">
                                    <label for="lastName">Last Name</label>
                                    <input type="text" id="lastName" name="lastName" required>
                                </div>
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" name="email" required>
                                </div>
                                <div class="form-group">
                                    <label for="phone">Phone</label>
                                    <input type="tel" id="phone" name="phone" required>
                                </div>
                                <div class="form-group">
                                    <label for="studentId">Student ID</label>
                                    <input type="text" id="studentId" name="studentId" required>
                                </div>
                                <div class="form-group">
                                    <label for="course">Course</label>
                                    <select id="course" name="course" required>
                                        <option value="">Select Course</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="semester">Semester</label>
                                    <input type="number" id="semester" name="semester" min="1" max="8" required>
                                </div>
                                <div class="form-group">
                                    <label for="gpa">GPA (out of 10)</label>
                                    <input type="number" id="gpa" name="gpa" min="0" max="10" step="0.1" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Register Student</button>
                                <button type="button" class="btn btn-secondary" onclick="clearStudentForm()">Clear Form</button>
                            </div>
                        </form>
                    </section>

                    <section class="students-section">
                        <div class="section-header">
                            <h2>Student Records</h2>
                            <div class="search-bar">
                                <input type="text" id="searchStudents" placeholder="Search students...">
                                <button onclick="searchStudentsData()">Search</button>
                            </div>
                        </div>
                        <div id="studentsList" class="students-grid">
                            <!-- Students will be loaded here -->
                        </div>
                    </section>
                </div>
            </div>

            <!-- Faculty Tab -->
            <div id="faculty-tab" class="tab-content">
                <div class="management-grid">
                    <section class="form-section">
                        <h2>Add Faculty Member</h2>
                        <form id="facultyForm">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="facultyFirstName">First Name</label>
                                    <input type="text" id="facultyFirstName" name="firstName" required>
                                </div>
                                <div class="form-group">
                                    <label for="facultyLastName">Last Name</label>
                                    <input type="text" id="facultyLastName" name="lastName" required>
                                </div>
                                <div class="form-group">
                                    <label for="facultyEmail">Email</label>
                                    <input type="email" id="facultyEmail" name="email" required>
                                </div>
                                <div class="form-group">
                                    <label for="facultyPhone">Phone</label>
                                    <input type="tel" id="facultyPhone" name="phone">
                                </div>
                                <div class="form-group">
                                    <label for="department">Department</label>
                                    <select id="department" name="department" required>
                                        <option value="">Select Department</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="specialization">Specialization</label>
                                    <input type="text" id="specialization" name="specialization" required>
                                </div>
                                <div class="form-group">
                                    <label for="hireDate">Hire Date</label>
                                    <input type="date" id="hireDate" name="hireDate" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Add Faculty</button>
                                <button type="button" class="btn btn-secondary" onclick="clearFacultyForm()">Clear Form</button>
                            </div>
                        </form>
                    </section>

                    <section class="students-section">
                        <div class="section-header">
                            <h2>Faculty Records</h2>
                            <div class="search-bar">
                                <input type="text" id="searchFaculty" placeholder="Search faculty...">
                                <button onclick="searchFacultyData()">Search</button>
                            </div>
                        </div>
                        <div id="facultyList" class="students-grid">
                            <!-- Faculty will be loaded here -->
                        </div>
                    </section>
                </div>
            </div>

            <!-- Courses Tab -->
            <div id="courses-tab" class="tab-content">
                <div class="management-grid">
                    <section class="form-section">
                        <h2>Add Course</h2>
                        <form id="courseForm">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="courseCode">Course Code</label>
                                    <input type="text" id="courseCode" name="courseCode" required>
                                </div>
                                <div class="form-group">
                                    <label for="courseName">Course Name</label>
                                    <input type="text" id="courseName" name="courseName" required>
                                </div>
                                <div class="form-group">
                                    <label for="credits">Credits</label>
                                    <input type="number" id="credits" name="credits" min="1" max="6" required>
                                </div>
                                <div class="form-group">
                                    <label for="courseDepartment">Department</label>
                                    <select id="courseDepartment" name="department" required>
                                        <option value="">Select Department</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="courseFaculty">Faculty</label>
                                    <select id="courseFaculty" name="faculty" required>
                                        <option value="">Select Faculty</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="courseSemester">Semester</label>
                                    <input type="number" id="courseSemester" name="semester" min="1" max="8" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Add Course</button>
                                <button type="button" class="btn btn-secondary" onclick="clearCourseForm()">Clear Form</button>
                            </div>
                        </form>
                    </section>

                    <section class="students-section">
                        <div class="section-header">
                            <h2>Course Records</h2>
                            <div class="search-bar">
                                <input type="text" id="searchCourses" placeholder="Search courses...">
                                <button onclick="searchCoursesData()">Search</button>
                            </div>
                        </div>
                        <div id="coursesList" class="students-grid">
                            <!-- Courses will be loaded here -->
                        </div>
                    </section>
                </div>
            </div>

            <!-- Departments Tab -->
            <div id="departments-tab" class="tab-content">
                <div class="management-grid">
                    <section class="form-section">
                        <h2>Add Department</h2>
                        <form id="departmentForm">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label for="departmentName">Department Name</label>
                                    <input type="text" id="departmentName" name="name" required>
                                </div>
                                <div class="form-group">
                                    <label for="headName">Head Name</label>
                                    <input type="text" id="headName" name="headName" required>
                                </div>
                                <div class="form-group">
                                    <label for="description">Description</label>
                                    <textarea id="description" name="description" rows="4"></textarea>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Add Department</button>
                                <button type="button" class="btn btn-secondary" onclick="clearDepartmentForm()">Clear Form</button>
                            </div>
                        </form>
                    </section>

                    <section class="students-section">
                        <div class="section-header">
                            <h2>Department Records</h2>
                            <div class="search-bar">
                                <input type="text" id="searchDepartments" placeholder="Search departments...">
                                <button onclick="searchDepartmentsData()">Search</button>
                            </div>
                        </div>
                        <div id="departmentsList" class="students-grid">
                            <!-- Departments will be loaded here -->
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <div id="notification" class="notification"></div>
    </div>

    <script>
        // Environment variables
        window.ENV = {
            SUPABASE_URL: 'https://kzmsvbiotmruimngbcfy.supabase.co',
            SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6bXN2YmlvdG1ydWltbmdiY2Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MDE0MDgsImV4cCI6MjA5MjE3NzQwOH0.tUXETKDixQRIHGgByWTu6QKLyveEDgHJIwibARksH0U'
        };

        let supabaseClient;
        let students = [];
        let faculty = [];
        let courses = [];
        let departments = [];
        let editingId = null;

        // Initialize Supabase
        function initializeSupabase() {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_ANON_KEY);
                loadAllData();
            } else {
                setTimeout(initializeSupabase, 100);
            }
        }

        // Tab switching
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        // Load all data
        async function loadAllData() {
            await Promise.all([
                loadStudents(),
                loadFaculty(),
                loadCourses(),
                loadDepartments()
            ]);
            populateDropdowns();
        }

        // Load students
        async function loadStudents() {
            try {
                const { data, error } = await supabaseClient.from('students').select('*');
                if (error) throw error;
                students = data || [];
                displayStudents();
            } catch (error) {
                showNotification('Error loading students: ' + error.message, 'error');
            }
        }

        // Load faculty
        async function loadFaculty() {
            try {
                const { data, error } = await supabaseClient.from('faculty').select('*');
                if (error) throw error;
                faculty = data || [];
                displayFaculty();
            } catch (error) {
                showNotification('Error loading faculty: ' + error.message, 'error');
            }
        }

        // Load courses
        async function loadCourses() {
            try {
                const { data, error } = await supabaseClient.from('courses').select('*');
                if (error) throw error;
                courses = data || [];
                displayCourses();
            } catch (error) {
                showNotification('Error loading courses: ' + error.message, 'error');
            }
        }

        // Load departments
        async function loadDepartments() {
            try {
                const { data, error } = await supabaseClient.from('departments').select('*');
                if (error) throw error;
                departments = data || [];
                displayDepartments();
            } catch (error) {
                showNotification('Error loading departments: ' + error.message, 'error');
            }
        }

        // Display functions
        function displayStudents() {
            const container = document.getElementById('studentsList');
            if (students.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No students found</h3><p>Start by registering your first student.</p></div>';
                return;
            }
            
            container.innerHTML = students.map(student => `
                <div class="student-card">
                    <div class="student-header">
                        <div class="student-name">${student.first_name} ${student.last_name}</div>
                        <div class="student-id">${student.student_id}</div>
                    </div>
                    <div class="student-info">
                        <div class="info-item">
                            <span class="info-label">Email:</span>
                            <span class="info-value">${student.email}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Phone:</span>
                            <span class="info-value">${student.phone}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">GPA:</span>
                            <span class="info-value">${student.gpa}/10</span>
                        </div>
                    </div>
                    <div class="student-actions">
                        <button class="btn-edit" onclick="editStudent('${student.id}')">Edit</button>
                        <button class="btn-danger" onclick="deleteStudent('${student.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function displayFaculty() {
            const container = document.getElementById('facultyList');
            if (faculty.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No faculty found</h3><p>Start by adding your first faculty member.</p></div>';
                return;
            }
            
            container.innerHTML = faculty.map(member => `
                <div class="student-card">
                    <div class="student-header">
                        <div class="student-name">${member.first_name} ${member.last_name}</div>
                        <div class="student-id">${member.specialization}</div>
                    </div>
                    <div class="student-info">
                        <div class="info-item">
                            <span class="info-label">Email:</span>
                            <span class="info-value">${member.email}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Phone:</span>
                            <span class="info-value">${member.phone || 'N/A'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Department:</span>
                            <span class="info-value">${getDepartmentName(member.department_id)}</span>
                        </div>
                    </div>
                    <div class="student-actions">
                        <button class="btn-edit" onclick="editFaculty('${member.id}')">Edit</button>
                        <button class="btn-danger" onclick="deleteFaculty('${member.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function displayCourses() {
            const container = document.getElementById('coursesList');
            if (courses.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No courses found</h3><p>Start by adding your first course.</p></div>';
                return;
            }
            
            container.innerHTML = courses.map(course => `
                <div class="student-card">
                    <div class="student-header">
                        <div class="student-name">${course.course_name}</div>
                        <div class="student-id">${course.course_code}</div>
                    </div>
                    <div class="student-info">
                        <div class="info-item">
                            <span class="info-label">Credits:</span>
                            <span class="info-value">${course.credits}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Department:</span>
                            <span class="info-value">${getDepartmentName(course.department_id)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Semester:</span>
                            <span class="info-value">${course.semester}</span>
                        </div>
                    </div>
                    <div class="student-actions">
                        <button class="btn-edit" onclick="editCourse('${course.id}')">Edit</button>
                        <button class="btn-danger" onclick="deleteCourse('${course.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function displayDepartments() {
            const container = document.getElementById('departmentsList');
            if (departments.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No departments found</h3><p>Start by adding your first department.</p></div>';
                return;
            }
            
            container.innerHTML = departments.map(dept => `
                <div class="student-card">
                    <div class="student-header">
                        <div class="student-name">${dept.name}</div>
                        <div class="student-id">Department</div>
                    </div>
                    <div class="student-info">
                        <div class="info-item">
                            <span class="info-label">Head:</span>
                            <span class="info-value">${dept.head_name}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">Description:</span>
                            <span class="info-value">${dept.description || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="student-actions">
                        <button class="btn-edit" onclick="editDepartment('${dept.id}')">Edit</button>
                        <button class="btn-danger" onclick="deleteDepartment('${dept.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Helper functions
        function getDepartmentName(deptId) {
            const dept = departments.find(d => d.id === deptId);
            return dept ? dept.name : 'N/A';
        }

        function getFacultyName(facultyId) {
            const member = faculty.find(f => f.id === facultyId);
            return member ? `${member.first_name} ${member.last_name}` : 'N/A';
        }

        function populateDropdowns() {
            // Populate department dropdowns
            const deptSelects = ['department', 'courseDepartment'];
            deptSelects.forEach(selectId => {
                const select = document.getElementById(selectId);
                if (select) {
                    select.innerHTML = '<option value="">Select Department</option>' +
                        departments.map(dept => `<option value="${dept.id}">${dept.name}</option>`).join('');
                }
            });

            // Populate faculty dropdown
            const facultySelect = document.getElementById('courseFaculty');
            if (facultySelect) {
                facultySelect.innerHTML = '<option value="">Select Faculty</option>' +
                    faculty.map(member => `<option value="${member.id}">${member.first_name} ${member.last_name}</option>`).join('');
            }
        }

        // Form handlers
        document.getElementById('studentForm').addEventListener('submit', handleStudentSubmit);
        document.getElementById('facultyForm').addEventListener('submit', handleFacultySubmit);
        document.getElementById('courseForm').addEventListener('submit', handleCourseSubmit);
        document.getElementById('departmentForm').addEventListener('submit', handleDepartmentSubmit);

        async function handleStudentSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const studentData = {
                first_name: formData.get('firstName'),
                last_name: formData.get('lastName'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                student_id: formData.get('studentId'),
                course: formData.get('course'),
                semester: parseInt(formData.get('semester')),
                gpa: parseFloat(formData.get('gpa')),
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await supabaseClient.from('students').insert([studentData]);
                if (error) throw error;
                showNotification('Student added successfully!', 'success');
                e.target.reset();
                await loadStudents();
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }
        }

        async function handleFacultySubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const facultyData = {
                first_name: formData.get('firstName'),
                last_name: formData.get('lastName'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                department_id: formData.get('department'),
                specialization: formData.get('specialization'),
                hire_date: formData.get('hireDate'),
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await supabaseClient.from('faculty').insert([facultyData]);
                if (error) throw error;
                showNotification('Faculty added successfully!', 'success');
                e.target.reset();
                await loadFaculty();
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }
        }

        async function handleCourseSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const courseData = {
                course_code: formData.get('courseCode'),
                course_name: formData.get('courseName'),
                credits: parseInt(formData.get('credits')),
                department_id: formData.get('department'),
                faculty_id: formData.get('faculty'),
                semester: parseInt(formData.get('semester')),
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await supabaseClient.from('courses').insert([courseData]);
                if (error) throw error;
                showNotification('Course added successfully!', 'success');
                e.target.reset();
                await loadCourses();
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }
        }

        async function handleDepartmentSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const deptData = {
                name: formData.get('name'),
                head_name: formData.get('headName'),
                description: formData.get('description'),
                created_at: new Date().toISOString()
            };

            try {
                const { data, error } = await supabaseClient.from('departments').insert([deptData]);
                if (error) throw error;
                showNotification('Department added successfully!', 'success');
                e.target.reset();
                await loadDepartments();
            } catch (error) {
                showNotification('Error: ' + error.message, 'error');
            }
        }

        // Clear form functions
        function clearStudentForm() {
            document.getElementById('studentForm').reset();
        }

        function clearFacultyForm() {
            document.getElementById('facultyForm').reset();
        }

        function clearCourseForm() {
            document.getElementById('courseForm').reset();
        }

        function clearDepartmentForm() {
            document.getElementById('departmentForm').reset();
        }

        // Search functions
        function searchStudentsData() {
            const searchTerm = document.getElementById('searchStudents').value.toLowerCase();
            const filtered = students.filter(s => 
                s.first_name.toLowerCase().includes(searchTerm) ||
                s.last_name.toLowerCase().includes(searchTerm) ||
                s.email.toLowerCase().includes(searchTerm)
            );
            displayFilteredStudents(filtered);
        }

        function searchFacultyData() {
            const searchTerm = document.getElementById('searchFaculty').value.toLowerCase();
            const filtered = faculty.filter(f => 
                f.first_name.toLowerCase().includes(searchTerm) ||
                f.last_name.toLowerCase().includes(searchTerm) ||
                f.email.toLowerCase().includes(searchTerm)
            );
            displayFilteredFaculty(filtered);
        }

        function searchCoursesData() {
            const searchTerm = document.getElementById('searchCourses').value.toLowerCase();
            const filtered = courses.filter(c => 
                c.course_name.toLowerCase().includes(searchTerm) ||
                c.course_code.toLowerCase().includes(searchTerm)
            );
            displayFilteredCourses(filtered);
        }

        function searchDepartmentsData() {
            const searchTerm = document.getElementById('searchDepartments').value.toLowerCase();
            const filtered = departments.filter(d => 
                d.name.toLowerCase().includes(searchTerm) ||
                d.head_name.toLowerCase().includes(searchTerm)
            );
            displayFilteredDepartments(filtered);
        }

        // Display filtered results
        function displayFilteredStudents(filtered) {
            const container = document.getElementById('studentsList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No students found</h3><p>Try different search terms.</p></div>';
                return;
            }
            // Reuse displayStudents with filtered data
            const temp = students;
            students = filtered;
            displayStudents();
            students = temp;
        }

        function displayFilteredFaculty(filtered) {
            const container = document.getElementById('facultyList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No faculty found</h3><p>Try different search terms.</p></div>';
                return;
            }
            const temp = faculty;
            faculty = filtered;
            displayFaculty();
            faculty = temp;
        }

        function displayFilteredCourses(filtered) {
            const container = document.getElementById('coursesList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No courses found</h3><p>Try different search terms.</p></div>';
                return;
            }
            const temp = courses;
            courses = filtered;
            displayCourses();
            courses = temp;
        }

        function displayFilteredDepartments(filtered) {
            const container = document.getElementById('departmentsList');
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No departments found</h3><p>Try different search terms.</p></div>';
                return;
            }
            const temp = departments;
            departments = filtered;
            displayDepartments();
            departments = temp;
        }

        // Notification function
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', initializeSupabase);
    </script>
</body>
